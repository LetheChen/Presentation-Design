<!DOCTYPE html>
<html lang="zh-CN" data-scheme="corporate-blue" data-density="standard">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  /*
   * ============================================================
   * 配色方案系统（5套方案，通过 data-scheme 切换）
   * 使用：document.documentElement.dataset.scheme = 'corporate-blue' | 'minimal-cyan' | 'warm-gold' | 'deep-space' | 'ink-green'
   * ============================================================
   */

  /* ── 方案1：企业蓝（默认）── */
  :root,
  :root[data-scheme="corporate-blue"] {
    --primary:    #1a365d;
    --secondary:  #2c5282;
    --accent:     #ed8936;
    --bg:         #f7fafc;
    --bg-slide:   #ffffff;
    --text:       #1a202c;
    --text-light: #4a5568;
    --white:      #ffffff;
    --border:     #e2e8f0;
    --cover-bg:   linear-gradient(135deg, #1a365d 0%, #234e82 50%, #2c5282 100%);
    --cover-text: #ffffff;
    --header-bg:  linear-gradient(135deg, var(--primary), var(--secondary));
    --toolbar-bg: #ffffff;
    --dot-bg:     rgba(255,255,255,0.4);
    --dot-active: var(--accent);
    --nav-bg:     rgba(26,54,93,0.8);
    --shadow:     rgba(26,54,93,0.09);
    --highlight-bg: linear-gradient(135deg, #ebf8ff, #f0fff4);
  }

  /* ── 方案2：极简青（科技感）── */
  :root[data-scheme="minimal-cyan"] {
    --primary:    #0d5b7a;
    --secondary:  #0891b2;
    --accent:     #f59e0b;
    --bg:         #f8fafc;
    --bg-slide:   #ffffff;
    --text:       #0f172a;
    --text-light: #475569;
    --white:      #ffffff;
    --border:     #cbd5e1;
    --cover-bg:   linear-gradient(135deg, #0d5b7a 0%, #0e7490 50%, #0891b2 100%);
    --cover-text: #ffffff;
    --header-bg:  linear-gradient(135deg, var(--primary), var(--secondary));
    --toolbar-bg: #ffffff;
    --dot-bg:     rgba(255,255,255,0.4);
    --dot-active: var(--accent);
    --nav-bg:     rgba(13,91,122,0.8);
    --shadow:     rgba(13,91,122,0.09);
    --highlight-bg: linear-gradient(135deg, #ecfeff, #f0fdfa);
  }

  /* ── 方案3：暖金雅（高端提案）── */
  :root[data-scheme="warm-gold"] {
    --primary:    #78350f;
    --secondary:  #92400e;
    --accent:     #d97706;
    --bg:         #fefce8;
    --bg-slide:   #fffbeb;
    --text:       #1c1917;
    --text-light: #57534e;
    --white:      #ffffff;
    --border:     #fde68a;
    --cover-bg:   linear-gradient(135deg, #78350f 0%, #92400e 50%, #b45309 100%);
    --cover-text: #ffffff;
    --header-bg:  linear-gradient(135deg, var(--primary), var(--secondary));
    --toolbar-bg: #ffffff;
    --dot-bg:     rgba(255,255,255,0.5);
    --dot-active: var(--accent);
    --nav-bg:     rgba(120,53,15,0.8);
    --shadow:     rgba(180,83,9,0.1);
    --highlight-bg: linear-gradient(135deg, #fffbeb, #fef3c7);
  }

  /* ── 方案4：深空黑（暗场科技）── */
  :root[data-scheme="deep-space"] {
    --primary:    #1e3a5f;
    --secondary:  #0f172a;
    --accent:     #38bdf8;
    --bg:         #020617;
    --bg-slide:   #0f172a;
    --text:       #f1f5f9;
    --text-light: #94a3b8;
    --white:      #1e293b;
    --border:     #334155;
    --cover-bg:   linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e3a5f 100%);
    --cover-text: #f1f5f9;
    --header-bg:  linear-gradient(135deg, #0f172a, #1e3a5f);
    --toolbar-bg: #1e293b;
    --dot-bg:     rgba(255,255,255,0.2);
    --dot-active: var(--accent);
    --nav-bg:     rgba(30,58,95,0.8);
    --shadow:     rgba(0,0,0,0.4);
    --highlight-bg: linear-gradient(135deg, #0f172a, #1e3a5f);
  }

  /* ── 方案5：墨绿稳（稳健汇报）── */
  :root[data-scheme="ink-green"] {
    --primary:    #14532d;
    --secondary:  #166534;
    --accent:     #fbbf24;
    --bg:         #f0fdf4;
    --bg-slide:   #ffffff;
    --text:       #1a2e1a;
    --text-light: #4d5e4d;
    --white:      #ffffff;
    --border:     #bbf7d0;
    --cover-bg:   linear-gradient(135deg, #14532d 0%, #166534 50%, #15803d 100%);
    --cover-text: #ffffff;
    --header-bg:  linear-gradient(135deg, var(--primary), var(--secondary));
    --toolbar-bg: #ffffff;
    --dot-bg:     rgba(255,255,255,0.4);
    --dot-active: var(--accent);
    --nav-bg:     rgba(20,83,45,0.8);
    --shadow:     rgba(20,83,45,0.09);
    --highlight-bg: linear-gradient(135deg, #f0fdf4, #dcfce7);
  }

  /* ── 字号密度方案 ── */
  :root[data-density="compact"]  { --font-scale: 0.85; }
  :root[data-density="standard"]  { --font-scale: 1;    }
  :root[data-density="spacious"]  { --font-scale: 1.15; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0f0f;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  /* Slide Container */
  .slides-wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .slide {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    background: var(--bg-slide);
    position: absolute;
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .slide.active { opacity: 1; z-index: 2; }

  /* Slide Header */
  .slide-header {
    background: var(--header-bg);
    color: var(--white);
    padding: clamp(18px, 2.3vw, 30px) clamp(32px, 3.8vw, 56px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .slide-header h1 {
    font-size: calc(clamp(15px, 1.9vw, 24px) * var(--font-scale, 1));
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .slide-header .slide-num {
    font-size: calc(clamp(10px, 1.1vw, 14px) * var(--font-scale, 1));
    opacity: 0.8;
  }

  /* Slide Body */
  .slide-body {
    flex: 1;
    padding: clamp(14px, 2.3vw, 34px) clamp(26px, 3.8vw, 56px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* Cover Slide */
  .slide-cover {
    background: var(--cover-bg);
    color: var(--cover-text);
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
  }
  .slide-cover .cover-content { position: relative; z-index: 1; }
  .slide-cover h1 {
    font-size: calc(clamp(26px, 4.2vw, 52px) * var(--font-scale, 1));
    font-weight: 800;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .slide-cover .subtitle {
    font-size: calc(clamp(12px, 1.6vw, 20px) * var(--font-scale, 1));
    opacity: 0.85;
    font-weight: 400;
    margin-bottom: 26px;
  }
  .slide-cover .meta {
    font-size: calc(clamp(10px, 1.1vw, 13px) * var(--font-scale, 1));
    opacity: 0.55;
    margin-top: 18px;
  }
  .accent-bar {
    width: 80px;
    height: 4px;
    background: var(--accent);
    margin: 0 auto 22px;
    border-radius: 2px;
  }

  /* Section Title */
  .section-num {
    font-size: calc(clamp(9px, 1vw, 12px) * var(--font-scale, 1));
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .section-title {
    font-size: calc(clamp(17px, 2.4vw, 32px) * var(--font-scale, 1));
    font-weight: 700;
    color: var(--primary);
    margin-bottom: calc(clamp(11px, 1.7vw, 20px) * var(--font-scale, 1));
    padding-bottom: 9px;
    border-bottom: 3px solid var(--accent);
    display: inline-block;
  }

  /* Layouts */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(12px, 1.9vw, 24px);
    flex: 1;
    align-items: start;
  }
  .three-col {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(9px, 1.5vw, 18px);
    flex: 1;
    align-items: start;
  }
  .four-col {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(7px, 1.3vw, 16px);
    flex: 1;
    align-items: start;
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: 10px;
    padding: clamp(11px, 1.7vw, 20px);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
    height: 100%;
  }
  .card h3 {
    font-size: calc(clamp(11px, 1.3vw, 17px) * var(--font-scale, 1));
    color: var(--primary);
    margin-bottom: 7px;
    font-weight: 700;
  }
  .card p, .card li {
    font-size: calc(clamp(9px, 1.05vw, 13px) * var(--font-scale, 1));
    color: var(--text-light);
    line-height: 1.6;
  }
  .card ul { list-style: none; padding: 0; }
  .card ul li::before { content: '▸'; color: var(--accent); margin-right: 5px; font-size: 0.85em; }
  .card ul li {
    font-size: calc(clamp(8px, 1vw, 12px) * var(--font-scale, 1));
    color: var(--text-light);
    padding: 2px 0;
    line-height: 1.5;
  }

  /* Tags */
  .tag {
    display: inline-block;
    background: var(--accent);
    color: var(--white);
    font-size: calc(clamp(7px, 0.85vw, 10px) * var(--font-scale, 1));
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .tag.blue   { background: var(--secondary); }
  .tag.green  { background: #38a169; }
  .tag.red    { background: #e53e3e; }
  .tag.purple { background: #805ad5; }

  /* Table */
  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: calc(clamp(8px, 1vw, 12px) * var(--font-scale, 1));
    flex: 1;
    overflow: hidden;
  }
  .tbl th {
    background: var(--primary);
    color: var(--white);
    padding: clamp(5px, 0.95vw, 10px) clamp(7px, 1.1vw, 14px);
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
  }
  .tbl td {
    padding: clamp(5px, 0.95vw, 10px) clamp(7px, 1.1vw, 14px);
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
    line-height: 1.5;
  }
  .tbl tr:nth-child(even) td { background: var(--bg); }

  /* Flow Diagram */
  .flow-diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(7px, 1.4vw, 16px);
    flex-wrap: wrap;
    flex: 1;
    padding: 5px 0;
  }
  .flow-step {
    background: var(--white);
    border: 2px solid var(--secondary);
    border-radius: 10px;
    padding: clamp(9px, 1.4vw, 16px) clamp(12px, 1.9vw, 22px);
    text-align: center;
    min-width: clamp(75px, 8.5vw, 108px);
    box-shadow: 0 3px 10px var(--shadow);
  }
  .flow-step .step-title {
    font-size: calc(clamp(9px, 1.1vw, 14px) * var(--font-scale, 1));
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 2px;
  }
  .flow-step .step-desc {
    font-size: calc(clamp(7px, 0.85vw, 10px) * var(--font-scale, 1));
    color: var(--text-light);
  }
  .flow-step.highlight { border-color: var(--accent); background: var(--bg); }
  .flow-step.highlight .step-title { color: var(--accent); }
  .flow-arrow { color: var(--accent); font-size: clamp(12px, 1.6vw, 20px); font-weight: bold; }

  /* Bullet List */
  .bullet-list { list-style: none; padding: 0; flex: 1; overflow-y: auto; }
  .bullet-list li {
    font-size: calc(clamp(9px, 1.2vw, 14px) * var(--font-scale, 1));
    color: var(--text);
    padding: clamp(4px, 0.85vw, 10px) 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.5;
  }
  .bullet-list li:last-child { border-bottom: none; }
  .bullet-list li::before { content: '●'; color: var(--accent); font-size: 0.7em; margin-top: 3px; flex-shrink: 0; }
  .bullet-list li .b-label { font-weight: 700; color: var(--primary); margin-right: 3px; }

  /* Highlight Box */
  .highlight-box {
    background: var(--highlight-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: clamp(10px, 1.5vw, 18px) clamp(13px, 1.9vw, 24px);
    margin-top: auto;
  }
  .highlight-box p { font-size: calc(clamp(9px, 1.1vw, 13px) * var(--font-scale, 1)); color: var(--text); line-height: 1.7; }

  /* TOC */
  .toc-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(11px, 1.7vw, 20px);
    flex: 1;
    align-items: start;
  }
  .toc-item {
    background: var(--white);
    border-radius: 10px;
    padding: clamp(12px, 1.9vw, 22px);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .toc-item:hover { box-shadow: 0 4px 16px var(--shadow); }
  .toc-num {
    font-size: calc(clamp(16px, 2.3vw, 28px) * var(--font-scale, 1));
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
    width: clamp(30px, 3.8vw, 44px);
  }
  .toc-text {
    font-size: calc(clamp(10px, 1.2vw, 14px) * var(--font-scale, 1));
    font-weight: 600;
    color: var(--primary);
    line-height: 1.4;
  }

  /* Compare */
  .compare-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(12px, 1.9vw, 22px);
    flex: 1;
    align-items: stretch;
  }
  .compare-box {
    background: var(--white);
    border-radius: 10px;
    padding: clamp(12px, 1.9vw, 22px);
    border: 2px solid var(--border);
  }
  .compare-box.left  { border-color: var(--secondary); }
  .compare-box.right { border-color: var(--accent); }
  .compare-box h3 {
    font-size: calc(clamp(12px, 1.45vw, 18px) * var(--font-scale, 1));
    font-weight: 700;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .compare-box.left h3  { color: var(--secondary); }
  .compare-box.right h3 { color: var(--accent); }
  .compare-box ul { list-style: none; padding: 0; }
  .compare-box li {
    font-size: calc(clamp(9px, 1.05vw, 13px) * var(--font-scale, 1));
    color: var(--text);
    padding: 3px 0;
    line-height: 1.5;
  }

  /* Summary Grid */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(9px, 1.4vw, 16px);
    flex: 1;
  }
  .summary-item {
    background: var(--white);
    border-radius: 10px;
    padding: clamp(11px, 1.5vw, 18px);
    border-left: 4px solid var(--accent);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .summary-item .s-num {
    font-size: calc(clamp(16px, 2vw, 25px) * var(--font-scale, 1));
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }
  .summary-item .s-body h4 {
    font-size: calc(clamp(10px, 1.1vw, 14px) * var(--font-scale, 1));
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 3px;
  }
  .summary-item .s-body p {
    font-size: calc(clamp(8px, 0.95vw, 12px) * var(--font-scale, 1));
    color: var(--text-light);
    line-height: 1.5;
  }

  /* End Slide */
  .slide-end {
    background: var(--cover-bg);
    color: var(--cover-text);
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .slide-end h2 {
    font-size: calc(clamp(24px, 3.8vw, 50px) * var(--font-scale, 1));
    font-weight: 800;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }
  .slide-end p { font-size: calc(clamp(11px, 1.4vw, 18px) * var(--font-scale, 1)); opacity: 0.65; }

  /* Footer */
  .slide-footer {
    padding: clamp(5px, 0.95vw, 9px) clamp(32px, 3.8vw, 56px);
    background: var(--primary);
    color: rgba(255,255,255,0.5);
    font-size: calc(clamp(8px, 0.9vw, 11px) * var(--font-scale, 1));
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  /* Slide content wrapper */
  .slide-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* Arch box */
  .arch-row { display: flex; align-items: stretch; gap: 9px; margin-bottom: 9px; flex: 1; }
  .arch-box { background: var(--white); border-radius: 10px; padding: clamp(9px, 1.4vw, 16px); border: 1.5px solid var(--border); flex: 1; }
  .arch-box.highlight { border-color: var(--accent); }
  .arch-box h4 { font-size: calc(clamp(10px, 1.1vw, 13px) * var(--font-scale, 1)); color: var(--primary); font-weight: 700; margin-bottom: 5px; }
  .arch-box ul { list-style: none; padding: 0; flex: 1; }
  .arch-box ul li { font-size: calc(clamp(8px, 0.85vw, 11px) * var(--font-scale, 1)); color: var(--text-light); padding: 2px 0; }
  .arch-box ul li::before { content: '→'; color: var(--accent); font-size: 0.85em; margin-right: 3px; }

  /* ============================================================
     FIXED UI ELEMENTS
     ============================================================ */

  /* Canvas */
  #drawCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 150; cursor: crosshair; }

  /* Page Dots */
  .page-dots { position: fixed; right: 18px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; z-index: 100; }
  .page-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot-bg); cursor: pointer; transition: all 0.3s; }
  .page-dot.active { background: var(--dot-active); transform: scale(1.35); }

  /* Annotation Toolbar */
  #toolbar {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--toolbar-bg);
    border-radius: 16px; padding: 9px 14px;
    display: none; align-items: center; gap: 7px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 200; flex-wrap: wrap; max-width: 88vw; justify-content: center;
    border: 1px solid var(--border);
  }
  #toolbar.visible { display: flex; }
  .tool-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--white); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.2s; flex-shrink: 0;
  }
  .tool-btn:hover { border-color: var(--secondary); background: var(--bg); }
  .tool-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }
  .tool-sep { width: 1px; height: 22px; background: var(--border); margin: 0 3px; }
  .color-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2.5px solid transparent; cursor: pointer;
    transition: transform 0.2s;
  }
  .color-btn:hover { transform: scale(1.2); }
  .color-btn.active { border-color: var(--text); transform: scale(1.15); }
  .size-btn {
    width: 30px; height: 30px; border-radius: 6px;
    border: 1.5px solid var(--border); background: var(--white);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .size-btn.active { background: var(--primary); border-color: var(--primary); }
  .size-btn .dot { background: var(--text); border-radius: 50%; }

  /* Nav Buttons */
  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--nav-bg); color: white; border: none;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: background 0.2s;
  }
  .nav-btn:hover { background: var(--primary); }
  .nav-btn.prev { left: clamp(7px, 1.4vw, 18px); }
  .nav-btn.next { right: clamp(7px, 1.4vw, 18px); }

<script>
// ============================================================
// TWEAKS SYSTEM (localStorage-persisted)
// ============================================================
const DEFAULTS = {
  scheme:  'corporate-blue',
  density: 'standard',
  dark:    'light',
};

function loadTweaks() {
  try {
    const s = localStorage.getItem('corp-pres-tweaks');
    return s ? { ...DEFAULTS, ...JSON.parse(s) } : { ...DEFAULTS };
  } catch { return { ...DEFAULTS }; }
}
function saveTweaks(t) {
  try { localStorage.setItem('corp-pres-tweaks', JSON.stringify(t)); } catch {}
}
function applyTweaks(t) {
  const root = document.documentElement;
  root.dataset.scheme  = t.scheme;
  root.dataset.density = t.density;
  root.dataset.dark     = t.dark;

  // Also update tweaks UI buttons
  document.querySelectorAll('[data-action="scheme"]').forEach(b =>
    b.classList.toggle('active', b.dataset.value === t.scheme));
  document.querySelectorAll('[data-action="density"]').forEach(b =>
    b.classList.toggle('active', b.dataset.value === t.density));
  document.querySelectorAll('[data-action="dark"]').forEach(b =>
    b.classList.toggle('active', b.dataset.value === t.dark));
}

const tweaks = loadTweaks();
applyTweaks(tweaks);

document.getElementById('tweaks-toggle').addEventListener('click', () => {
  document.getElementById('tweaks-body').classList.toggle('open');
});
document.getElementById('tweaks-reset').addEventListener('click', () => {
  const t = { ...DEFAULTS };
  saveTweaks(t);
  applyTweaks(t);
});

document.querySelectorAll('.tweak-btn[data-action]').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    const value  = btn.dataset.value;
    const t = { ...tweaks, [action]: value };
    Object.assign(tweaks, t);
    saveTweaks(tweaks);
    applyTweaks(tweaks);
  });
});

// ============================================================
// NAVIGATION
// ============================================================
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
const totalSlides = slides.length;

function goToSlide(n) {
  slides[currentSlide].classList.remove('active');
  currentSlide = (n + totalSlides) % totalSlides;
  slides[currentSlide].classList.add('active');
  updateDots();
  setTimeout(loadDrawing, 60);
}
function nextSlide() { goToSlide(currentSlide + 1); }
function prevSlide() { goToSlide(currentSlide - 1); }

document.getElementById('nextBtn').addEventListener('click', nextSlide);
document.getElementById('prevBtn').addEventListener('click', prevSlide);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') { toggleToolbar(); document.getElementById('tweaks-body').classList.remove('open'); }
  if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
});

// ============================================================
// PAGE DOTS
// ============================================================
const dotsContainer = document.getElementById('pageDots');
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'page-dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goToSlide(i));
  dotsContainer.appendChild(dot);
});
function updateDots() {
  document.querySelectorAll('.page-dot').forEach((d, i) =>
    d.classList.toggle('active', i === currentSlide));
}

// ============================================================
// DRAWING CANVAS
// ============================================================
const canvas = document.getElementById('drawCanvas');
const ctx    = canvas.getContext('2d');
let isDrawing = false, drawMode = 'pen';
let currentColor = '#e53e3e', brushSize = 4;
let startX, startY;
const drawings = {};

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: cx - rect.left, y: cy - rect.top };
}
function startDraw(e) {
  if (!toolbarVisible) return;
  e.preventDefault();
  isDrawing = true;
  const p = getPos(e);
  startX = p.x; startY = p.y;
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const p = getPos(e);
  if (drawMode === 'pen') { ctx.lineTo(p.x, p.y); ctx.stroke(); }
}
function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  const p = e.changedTouches
    ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY }
    : getPos(e);
  if (drawMode === 'line') { ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(p.x, p.y); ctx.stroke(); }
  else if (drawMode === 'rect') { ctx.strokeRect(startX, startY, p.x - startX, p.y - startY); }
  saveDrawing();
}
canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  draw,  { passive: false });
canvas.addEventListener('touchend',   endDraw);

function saveDrawing() {
  if (!drawings[currentSlide]) drawings[currentSlide] = [];
  drawings[currentSlide].push(canvas.toDataURL());
}
function loadDrawing() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (drawings[currentSlide] && drawings[currentSlide].length > 0) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = drawings[currentSlide][drawings[currentSlide].length - 1];
  }
}
function clearCurrentDrawing() { delete drawings[currentSlide]; ctx.clearRect(0,0,canvas.width,canvas.height); }
function clearAllDrawings()    { Object.keys(drawings).forEach(k => delete drawings[k]); ctx.clearRect(0,0,canvas.width,canvas.height); }

// ============================================================
// TOOLBAR
// ============================================================
let toolbarVisible = false;
function toggleToolbar() {
  toolbarVisible = !toolbarVisible;
  document.getElementById('toolbar').classList.toggle('visible', toolbarVisible);
  canvas.style.pointerEvents = toolbarVisible ? 'all' : 'none';
}

document.querySelectorAll('.tool-btn').forEach(btn => {
  if      (btn.id === 'toolClear')    btn.addEventListener('click', clearCurrentDrawing);
  else if (btn.id === 'toolClearAll') btn.addEventListener('click', clearAllDrawings);
  else if (['toolPen','toolLine','toolRect'].includes(btn.id)) {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#toolPen,#toolLine,#toolRect').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      drawMode = btn.id === 'toolPen' ? 'pen' : btn.id === 'toolLine' ? 'line' : 'rect';
    });
  }
});
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    brushSize = parseInt(btn.dataset.size);
  });
});

// Double-click to toggle toolbar
document.querySelector('.slides-wrapper').addEventListener('dblclick', () => toggleToolbar());

// === FULLSCREEN PRESENTATION ===
let isFullscreen = false;
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    isFullscreen = true;
  } else {
    document.exitFullscreen().catch(() => {});
    isFullscreen = false;
  }
}
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fullscreenBtn');
  btn.textContent = document.fullscreenElement ? '✕' : '⛶';
  btn.style.background = document.fullscreenElement ? 'rgba(237,137,54,0.85)' : 'rgba(26,54,93,0.65)';
});

// ============================================================
// EXPORT BUTTONS (零服务器 · 直接导出)
// 策略：嵌入导出脚本为模板字符串 → 写临时文件 → Python执
export → 解码下载

const _findPython = () => {
  const cmds = ['py', 'python', 'python3', 'C:\\Python\\python.exe'];
  for (const c of cmds) {
    try {
      const out = require('child_process').execSync(c + ' --version', {timeout:5000, encoding:'utf8'});

  const _htmlPath = () => { const h = location.href; return h.startsWith('file://') ? h.slice(8).replace(/\//g,'\\') : h; };
  let result;
  try {
    const out = execSync(`${PY} "${pyPath}" "${mjsPath}" "${outPath}" "${fmt}" "${_htmlPath()}"`, {timeout:130000, encoding:'utf8', cwd: tmpDir});
    result = JSON.parse(out.trim());
  } finally {
    try { require('fs').unlinkSync(pyPath); } catch {}
  }

  if (result.error) throw new Error(result.error);
  return { data: result.data, name: outName };
};

const _makeDownload = (b64, name) => {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  const blob = new Blob([arr], { type: name.endsWith('.pdf') ? 'application/pdf' : 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
};

const _exportBtn = (id, fmt) => {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const hint = document.getElementById('export-hint');
    btn.disabled = true;
    btn.textContent = '导出中...';
    try {
      const { data, name } = await _runExport(fmt);
      _makeDownload(data, name);
      if (hint) { hint.textContent = '✅ 导出成功'; hint.style.color = '#38a169'; }
    } catch (e) {
      if (hint) { hint.textContent = '❌ ' + (e.message || '导出失败'); hint.style.color = '#e53e3e'; }
    } finally {
      btn.disabled = false;
      btn.textContent = fmt === 'pdf' ? '📄 PDF' : '📊 PPTX';
    }
  });
};
_exportBtn('export-pdf-btn', 'pdf');
_exportBtn('export-pptx-btn', 'pptx');
</script>
</body>
